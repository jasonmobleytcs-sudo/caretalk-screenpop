<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 260px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #fff;
    color: #1a1a2e;
  }
  .header {
    background: #2372eb;
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #7dff9e;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .body { padding: 14px 16px; }
  p { color: #555; line-height: 1.5; margin-bottom: 12px; }
  label { font-size: 11px; font-weight: 600; color: #888; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  input[type=email] {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #d0e1fd;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    margin-bottom: 8px;
  }
  input[type=email]:focus { border-color: #2372eb; }
  button {
    width: 100%;
    padding: 8px;
    background: #2372eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #1a5ecc; }
  #saved-msg { font-size: 11px; color: #1a7a3a; margin-top: 6px; min-height: 16px; }
  .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .note { font-size: 11px; color: #aaa; line-height: 1.5; }
</style>
</head>
<body>
  <div class="header">
    <span class="dot"></span>
    CareTalk Screenpop Active
  </div>
  <div class="body">
    <p>CareTalk360 opens automatically when a call transfers to your queue.</p>

    <hr class="divider">

    <label>Your Zoom Email (optional)</label>
    <input type="email" id="agent-email" placeholder="you@company.com" />
    <button id="save-btn">Save Email</button>
    <div id="saved-msg"></div>

    <hr class="divider">
    <p class="note">Enter your Zoom email to receive only <em>your</em> calls. Leave blank to receive all queue calls.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
