<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 240px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #fff;
    color: #1a1a2e;
  }
  h3 { font-size: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #27ae60;
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  p { color: #555; line-height: 1.5; margin-top: 8px; }
  .note { margin-top: 12px; font-size: 11px; color: #999; border-top: 1px solid #eee; padding-top: 10px; }
</style>
</head>
<body>
  <h3>🖥️ CareTalk Screenpop <span class="dot"></span></h3>
  <p><strong>Active</strong> — monitoring for Zoom CC call transfers.</p>
  <p>CareTalk360 will open automatically in Chrome when a call is transferred to your queue.</p>
  <p class="note">No action required. Keep Chrome running.</p>
</body>
</html>
