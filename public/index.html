<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caretalk Screenpop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6fb;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #2372eb;
      color: white;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-bar {
      padding: 8px 20px;
      font-size: 12px;
      background: #e8f0fe;
      color: #2372eb;
      font-weight: 500;
      border-bottom: 1px solid #d0e1fd;
    }
    .content { padding: 16px; flex: 1; overflow-y: auto; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin-bottom: 10px;
    }
    .field { margin-bottom: 8px; font-size: 14px; }
    .field label { color: #999; font-size: 11px; display: block; margin-bottom: 2px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.active { background: #d4edda; color: #1a7a3a; }
    .badge.idle   { background: #fff3cd; color: #856404; }
    .badge.ended  { background: #f8d7da; color: #842029; }
    .badge.unknown{ background: #e2e3e5; color: #555; }

    /* ── Phone Lookup ── */
    .lookup-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .lookup-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid #d0e1fd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .lookup-row input:focus { border-color: #2372eb; }
    .lookup-row button {
      padding: 10px 16px;
      background: #2372eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .lookup-row button:hover    { background: #1a5ecc; }
    .lookup-row button:disabled { background: #a0b8e8; cursor: not-allowed; }

    .result {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
      display: none;
    }
    .result.success { background: #d4edda; color: #1a7a3a; display: block; }
    .result.error   { background: #f8d7da; color: #842029; display: block; }

    #log {
      font-size: 11px;
      color: #666;
      max-height: 100px;
      overflow-y: auto;
      background: #f8f9fa;
      border-radius: 6px;
      padding: 8px;
    }
    .log-entry { margin-bottom: 3px; }
    .log-entry time { color: #bbb; margin-right: 5px; }
  </style>
</head>
<body>

<header>
  <span>🖥️</span> Caretalk Screenpop
</header>
<div class="status-bar" id="sdk-status">Ready — enter caller phone to look up</div>

<div class="content">

  <!-- Phone Lookup -->
  <div class="lookup-row">
    <input id="phone-input" type="tel" placeholder="Caller phone  e.g. 5158830400" />
    <button id="lookup-btn">Look Up</button>
  </div>
  <div class="result" id="result"></div>

  <!-- Engagement Info -->
  <div class="card">
    <h3>Engagement</h3>
    <div class="field">
      <label>Status</label>
      <span id="eng-status"><span class="badge unknown">—</span></span>
    </div>
    <div class="field">
      <label>Engagement ID</label>
      <span id="eng-id">—</span>
    </div>
    <div class="field">
      <label>Channel</label>
      <span id="eng-channel">—</span>
    </div>
    <div class="field">
      <label>Direction</label>
      <span id="eng-direction">—</span>
    </div>
    <div class="field">
      <label>Consumer</label>
      <span id="eng-consumer">—</span>
    </div>
  </div>

  <!-- Customer Info (populated from engagement variables) -->
  <div class="card" id="customer-card" style="display:none">
    <h3>Customer</h3>
    <div class="field">
      <label>Customer ID</label>
      <span id="cust-id">—</span>
    </div>
    <div class="field">
      <label>Appointment ID</label>
      <span id="cust-appt">—</span>
    </div>
    <div class="field">
      <label>Phone</label>
      <span id="cust-phone">—</span>
    </div>
    <div class="field">
      <label>State</label>
      <span id="cust-state">—</span>
    </div>
    <div class="field">
      <label>Partner</label>
      <span id="cust-partner">—</span>
    </div>
    <div class="field">
      <label>Recommended Route</label>
      <span id="cust-route">—</span>
    </div>
  </div>

  <!-- Agent Info -->
  <div class="card">
    <h3>Agent</h3>
    <div class="field">
      <label>Name</label>
      <span id="agent-name">—</span>
    </div>
    <div class="field">
      <label>Context</label>
      <span id="running-context">—</span>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h3>Activity Log</h3>
    <div id="log"></div>
  </div>

</div>

<script src="/app.js"></script>
</body>
</html>
